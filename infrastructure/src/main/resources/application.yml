spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/subscript
    username: subscript
    password: subscript
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

# Claves RSA para firmar y verificar tokens JWT.
# En producción estas claves deben estar fuera del classpath
# (variables de entorno o un gestor de secretos como AWS Secrets Manager).
rsa:
  private-key: classpath:keys/private.pem
  public-key: classpath:keys/public.pem
