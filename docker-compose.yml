services:
  postgres:
    image: postgres:16-alpine
    container_name: subscript-db
    environment:
      POSTGRES_DB: subscript
      POSTGRES_USER: subscript
      POSTGRES_PASSWORD: subscript
    ports:
      - "5432:5432"
    volumes:
      - subscript_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subscript -d subscript"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: subscript-redis
    ports:
      - "6379:6379"
    volumes:
      - subscript_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: subscript-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: subscript
      MONGO_INITDB_ROOT_PASSWORD: subscript
      MONGO_INITDB_DATABASE: subscript
    ports:
      - "27017:27017"
    volumes:
      - subscript_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  subscript_data:
  subscript_redis_data:
  subscript_mongo_data:
